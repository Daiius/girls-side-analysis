services:
  nextjs:
    build:
      dockerfile: ./next/Dockerfile.nextjs
    container_name: girls-side-analysis-nextjs-dev
    environment:
      TZ: 'Asia/Tokyo'
    env_file:
      - next/.env.development
      - next/.env.local
    ports:
      - 3000:3000
    depends_on:
      database-preparation:
        condition: service_completed_successfully
    # bind mount をやめ docker compose watch でソースを同期する。
    # virtiofs のイベント取りこぼしが無くなり HMR が安定、FS もコンテナネイティブで高速。
    develop:
      watch:
        - action: sync
          path: ./next
          target: /workspace/next
          ignore:
            - node_modules/
            - .next/
        # next は server-ts/client (Hono RPC) を import するので server-ts も同期する
        - action: sync
          path: ./server-ts
          target: /workspace/server-ts
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./pnpm-lock.yaml

  server:
    build:
      dockerfile: ./server-ts/Dockerfile.server
    container_name: girls-side-analysis-server
    env_file:
      - ./server-ts/.env.development
    environment:
      TZ: 'Asia/Tokyo'
    working_dir: /workspace/server-ts
    ports:
      - 4000:3000
    # tsx watch が自前で再起動するため sync のみ（コンテナ全体の restart は不要）
    develop:
      watch:
        - action: sync
          path: ./server-ts
          target: /workspace/server-ts
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./pnpm-lock.yaml

  database:
    image: mysql:8.4
    container_name: girls-side-analysis-database
    env_file:
      - ./server-ts/.env.development
    # 注. テスト用、データは永続しない
    tmpfs:
      - /var/lib/mysql
    environment:
      TZ: 'Asia/Tokyo'
      LANG: 'ja_JP.UTF-8'
    cap_add:
      - SYS_NICE
    healthcheck:
      test: mysql -u $$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE -e "select 1;"
      interval: 5s
      timeout: 30s
      retries: 4
      start_period: 5s

  database-preparation:
    # 専用 seed イメージは廃止し server イメージを流用（drizzle-kit / tsx / mysql2 は
    # server-ts の依存に含まれ、ルート onlyBuiltDependencies で esbuild も承認済み）。
    build:
      dockerfile: ./server-ts/Dockerfile.server
    container_name: girls-side-analysis-database-seed
    env_file:
      - server-ts/.env.development
    working_dir: /workspace/server-ts
    command: >
      bash -c '
        pnpm drizzle-kit push \
          --dialect=mysql \
          --schema=src/db/schema.ts \
          --host=$$DB_HOST \
          --user=$$MYSQL_USER \
          --password=$$MYSQL_PASSWORD \
          --database=$$MYSQL_DATABASE && \
        pnpm tsx addTestData.ts
      '
    depends_on:
      database:
        condition: service_healthy

networks:
  default:
    name: girls-side-analysis-network
