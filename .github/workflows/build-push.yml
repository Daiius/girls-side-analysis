name: Build and push server image to GHCR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # github.repository (Daiius/girls-side-analysis) は metadata-action が小文字化するので
          # 最終的なイメージ名は ghcr.io/daiius/girls-side-analysis-server になる
          images: ghcr.io/${{ github.repository }}-server
          # push されるタグ:
          #   - ブランチ名 (/ は - に置換)        例: :ci-ghcr-build-push, main 実行なら :main
          #   - sha-<40桁フルSHA>                 例: :sha-fc211a4...（固定参照用）
          #   - :latest                           main(デフォルトブランチ)実行時のみ追加
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server-ts/Dockerfile.server.prod
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
